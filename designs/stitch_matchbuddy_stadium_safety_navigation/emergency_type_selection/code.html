<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MatchBuddy - SOS Emergency</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#ffb786",
                        "on-secondary-fixed-variant": "#93000b",
                        "secondary-fixed": "#ffdad6",
                        "secondary-fixed-dim": "#ffb4ab",
                        "on-secondary-fixed": "#410002",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container-highest": "#353534",
                        "tertiary-container": "#df7412",
                        "outline": "#8c909f",
                        "on-secondary": "#690005",
                        "on-primary": "#002e6a",
                        "surface-bright": "#3a3939",
                        "primary": "#adc6ff",
                        "on-error": "#690005",
                        "primary-container": "#4d8eff",
                        "on-tertiary-container": "#461f00",
                        "surface-dim": "#131313",
                        "on-surface-variant": "#c2c6d6",
                        "secondary-container": "#db0418",
                        "on-tertiary-fixed-variant": "#723600",
                        "primary-fixed": "#d8e2ff",
                        "tertiary": "#ffb786",
                        "on-tertiary": "#502400",
                        "surface": "#131313",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#004395",
                        "tertiary-fixed": "#ffdcc6",
                        "background": "#131313",
                        "surface-container": "#201f1f",
                        "inverse-on-surface": "#313030",
                        "error": "#ffb4ab",
                        "surface-container-high": "#2a2a2a",
                        "surface-tint": "#adc6ff",
                        "on-background": "#e5e2e1",
                        "on-secondary-container": "#ffecea",
                        "on-primary-container": "#00285d",
                        "outline-variant": "#424754",
                        "on-primary-fixed": "#001a42",
                        "inverse-primary": "#005ac2",
                        "inverse-surface": "#e5e2e1",
                        "primary-fixed-dim": "#adc6ff",
                        "on-tertiary-fixed": "#311400",
                        "surface-variant": "#353534",
                        "on-surface": "#e5e2e1",
                        "secondary": "#ffb4ab",
                        "surface-container-low": "#1c1b1b",
                        "error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim text-on-surface min-h-screen flex flex-col pt-16 pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#131313] shadow-[0px_0px_32px_rgba(173,198,255,0.06)] bg-gradient-to-b from-[#1C1B1B] to-transparent">
<button class="text-[#C2C6D6] hover:bg-[#2A2A2A] transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="text-xl font-black tracking-tighter text-[#ADC6FF] bg-clip-text text-transparent bg-gradient-to-br from-[#ADC6FF] to-[#4D8EFF] font-['Inter'] uppercase">
            MATCHBUDDY
        </div>
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant/15 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="person">person</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-6 pt-8 max-w-2xl mx-auto w-full relative z-10">
<!-- Header Section -->
<div class="mb-10 text-center">
<h1 class="text-4xl font-black tracking-tight text-error mb-3" style="text-shadow: 0 0 32px rgba(255,180,171,0.3);">
                EMERGENCY SOS
            </h1>
<p class="text-on-surface-variant text-sm font-medium">Select the type of emergency to alert the nearest response team immediately.</p>
</div>
<!-- Emergency Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12 flex-1 content-start">
<!-- Medical Card (Selected State) -->
<button class="relative group bg-error-container rounded-[1rem] p-6 flex flex-col items-center justify-center min-h-[160px] shadow-[0_0_32px_rgba(255,180,171,0.15)] ring-2 ring-error/50 transition-all active:scale-95 overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-error/10 to-transparent"></div>
<div class="relative z-10 bg-surface-lowest/50 p-4 rounded-full mb-4 ring-1 ring-error/30 shadow-[0_0_20px_rgba(255,180,171,0.2)]">
<span class="material-symbols-outlined text-4xl text-error drop-shadow-[0_0_8px_rgba(255,180,171,0.8)]" data-icon="medical_services" data-weight="fill" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<span class="relative z-10 text-on-error-container font-bold text-lg tracking-wide uppercase">Medical</span>
<!-- Active Indicator -->
<div class="absolute top-4 right-4 w-3 h-3 bg-error rounded-full shadow-[0_0_8px_rgba(255,180,171,0.8)]"></div>
</button>
<!-- Security Card -->
<button class="relative group bg-surface-container-high rounded-[1rem] p-6 flex flex-col items-center justify-center min-h-[160px] border border-outline-variant/15 hover:bg-surface-container-highest transition-all active:scale-95">
<div class="bg-surface-container-low p-4 rounded-full mb-4">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="security">security</span>
</div>
<span class="text-on-surface font-semibold text-lg tracking-wide uppercase">Security</span>
</button>
<!-- Lost Person Card -->
<button class="relative group bg-surface-container-high rounded-[1rem] p-6 flex flex-col items-center justify-center min-h-[160px] border border-outline-variant/15 hover:bg-surface-container-highest transition-all active:scale-95">
<div class="bg-surface-container-low p-4 rounded-full mb-4">
<span class="material-symbols-outlined text-4xl text-tertiary-fixed-dim" data-icon="directions_walk">directions_walk</span>
</div>
<span class="text-on-surface font-semibold text-lg tracking-wide uppercase">Lost Person</span>
</button>
<!-- Fire / Panic Card -->
<button class="relative group bg-surface-container-high rounded-[1rem] p-6 flex flex-col items-center justify-center min-h-[160px] border border-outline-variant/15 hover:bg-surface-container-highest transition-all active:scale-95">
<div class="bg-surface-container-low p-4 rounded-full mb-4">
<span class="material-symbols-outlined text-4xl text-tertiary-container" data-icon="local_fire_department">local_fire_department</span>
</div>
<span class="text-on-surface font-semibold text-lg tracking-wide uppercase">Fire / Panic</span>
</button>
</div>
<!-- Sticky Bottom Action -->
<div class="mt-auto pb-6">
<button class="w-full bg-gradient-to-br from-error to-secondary-container text-on-error rounded-xl py-5 px-6 font-black text-xl tracking-tight uppercase flex items-center justify-center gap-3 shadow-[0_0_40px_rgba(219,4,24,0.3)] active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined" data-icon="warning" data-weight="fill" style="font-variation-settings: 'FILL' 1;">warning</span>
                Confirm Emergency
            </button>
<p class="text-center text-on-surface-variant text-xs mt-4 uppercase tracking-widest opacity-60">False alarms may result in penalties</p>
</div>
</main>
<!-- BottomNavBar (Hidden on this transactional screen per requirements, keeping structure commented for reference if needed globally) -->
<!-- Navigation intentionally suppressed on transactional/SOS screen -->
</body></html>
