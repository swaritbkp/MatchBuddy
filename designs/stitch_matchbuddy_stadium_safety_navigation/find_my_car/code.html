<body class="bg-surface-dim text-on-surface min-h-screen flex flex-col pt-16 pb-24 overflow-hidden">

</button>
<h1 class="font-['Inter'] font-black tracking-tight uppercase text-xl text-[#ADC6FF] bg-clip-text text-transparent bg-gradient-to-br from-[#ADC6FF] to-[#4D8EFF]">MATCHBUDDY</h1>
<button class="text-[#ADC6FF] hover:bg-[#2A2A2A] transition-colors active:scale-95 transition-transform duration-200 p-2 rounded-xl flex items-center justify-center">

<path class="drop-shadow-[0_0_8px_rgba(173,198,255,0.6)]" d="M 200,600 Q 180,500 250,400 T 150,250" fill="none" stroke="url(#pathGradient)" stroke-dasharray="10 10" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>

<stop offset="0%" stop-color="#adc6ff" stop-opacity="0.3"></stop>
<stop offset="100%" stop-color="#4d8eff"></stop>
</lineargradient>
</defs>
</svg>
<!-- User Location Pin -->
<div class="absolute bottom-[25%] left-[50%] transform -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center animate-pulse shadow-[0_0_32px_rgba(173,198,255,0.2)]">
<div class="w-6 h-6 rounded-full bg-gradient-to-br from-primary to-primary-container shadow-[0_0_16px_rgba(173,198,255,0.8)] border-2 border-surface-container-lowest"></div>
</div>
</div>
<!-- Car Location Pin -->
<div class="absolute top-[30%] left-[35%] transform -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
<div class="bg-surface-container-highest px-3 py-1.5 rounded-lg mb-2 shadow-[0_0_24px_rgba(219,4,24,0.15)] border border-outline-variant/20 backdrop-blur-md">
<span class="text-xs font-bold tracking-wider text-secondary">ZONE B</span>
</div>
<div class="w-10 h-10 rounded-full bg-secondary-container/20 flex items-center justify-center shadow-[0_0_24px_rgba(255,180,171,0.3)]">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
</div>
</div>
<!-- UI Overlays -->
<div class="relative z-20 flex flex-col h-full justify-between p-4 pointer-events-none">
<!-- Top Section: Info Card & Banner -->
<div class="space-y-4 pointer-events-auto mt-2">
<!-- Best Exit Banner -->
<div class="bg-surface-container-low/80 backdrop-blur-xl border border-outline-variant/15 rounded-xl p-3 flex items-center justify-between shadow-[0_8px_32px_rgba(0,0,0,0.4)]">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-sm">exit_to_app</span>
</div>
<div>
<p class="text-[10px] font-medium text-on-surface-variant uppercase tracking-widest">Recommended Route</p>
<p class="text-sm font-bold text-on-surface">Best exit: Gate 4 (East)</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-sm">chevron_right</span>
</div>
<!-- Car Location Card -->
<div class="bg-surface-container-highest/90 backdrop-blur-2xl rounded-full border border-outline-variant/20 p-4 shadow-[0_16px_48px_rgba(0,0,0,0.5)] overflow-hidden relative">
<div class="flex items-start gap-4 relative z-10">
<div class="w-24 h-24 rounded-lg overflow-hidden shrink-0 border border-outline-variant/30 shadow-inner">
<img alt="Car photo" class="w-full h-full object-cover grayscale opacity-80 hover:grayscale-0 hover:opacity-100 transition-all duration-500" data-alt="Sleek dark grey modern car parked in a dimly lit concrete parking garage with overhead fluorescent lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGs_IR0rIaNr9YDMAKzMIZKZfTFax66oUYkbgNWOvAioTnbSmXyG1Sgl8-Na3ihiIVl6YdbAdeLLNt-2sa7hn90o6YZx6gQlcJVqikoDFVA8SeP8fR0esEPVxCgDKIaCMEk-PKfB8bP-k8CP-xVRbJGQcBFI5OFDYuU2YaSKwDDVCPxs41x9EPXkrE4UIZib9_dXnRIL03rPLQrzCSCtGUxWJ58OGEcfqqE4mi45U4LnDWN_WGMD3ZdFn1sg81gYqG-5nKgpY_uU8"/>
</div>
<div class="flex-1 py-1">
<div class="flex items-center gap-2 mb-1">
<span class="w-2 h-2 rounded-full bg-success shadow-[0_0_8px_#22c55e]"></span>
<span class="text-[10px] font-bold text-success uppercase tracking-widest">Saved Location</span>
</div>
<h2 class="text-2xl font-black tracking-tight text-on-surface mb-1">Zone B</h2>
<p class="text-sm text-on-surface-variant font-medium flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">layers</span> Level 2
                            </p>
<div class="mt-3 inline-flex items-center gap-2 bg-surface-container-lowest px-2 py-1 rounded-md border border-outline-variant/10">
<span class="material-symbols-outlined text-[14px] text-primary">schedule</span>
<span class="text-[10px] text-on-surface-variant">Parked 3h 12m ago</span>
</div>
</div>
</div>
<!-- Decorative gradient accent -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full blur-2xl -mr-16 -mt-16 pointer-events-none"></div>
</div>
</div>
<!-- Bottom Section: CTA -->
<div class="pointer-events-auto pb-4">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center gap-2 shadow-[0_0_32px_rgba(173,198,255,0.15)] active:scale-[0.98] transition-transform duration-300 ease-[spring(1,100,20,0)] border border-primary-fixed/20">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">navigation</span>

</button>
<div class="mt-3 flex justify-center gap-6">
<button class="flex items-center gap-1.5 text-xs font-medium text-on-surface-variant hover:text-on-surface transition-colors">

<button class="flex items-center gap-1.5 text-xs font-medium text-secondary hover:text-secondary-fixed transition-colors">
<span class="material-symbols-outlined text-[16px]">delete</span> Forget
                    </button>
</div>
</div>
</div>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#0E0E0E]/80 backdrop-blur-xl rounded-t-[1.5rem] border-t border-[#424754]/15 shadow-[0_-8px_32px_rgba(0,0,0,0.5)]">
<a class="flex flex-col items-center justify-center text-[#C2C6D6] opacity-60 hover:text-[#ADC6FF] hover:opacity-100 active:scale-90 transition-all duration-300 ease-[spring(1,100,20,0)] w-16" href="#">

<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">Safety</span>

<a class="flex flex-col items-center justify-center text-[#ADC6FF] bg-[#2A2A2A] rounded-xl px-4 py-1 active:scale-90 transition-all duration-300 ease-[spring(1,100,20,0)] w-16" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">near_me</span>

<span class="material-symbols-outlined mb-1">groups</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">Crowd</span>

<a class="flex flex-col items-center justify-center text-[#C2C6D6] opacity-60 hover:text-[#ADC6FF] hover:opacity-100 active:scale-90 transition-all duration-300 ease-[spring(1,100,20,0)] w-16" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">Profile</span>
