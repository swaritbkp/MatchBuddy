<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SOS Countdown - MatchBuddy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#ffb786",
                    "on-secondary-fixed-variant": "#93000b",
                    "secondary-fixed": "#ffdad6",
                    "secondary-fixed-dim": "#ffb4ab",
                    "on-secondary-fixed": "#410002",
                    "surface-container-lowest": "#0e0e0e",
                    "surface-container-highest": "#353534",
                    "tertiary-container": "#df7412",
                    "outline": "#8c909f",
                    "on-secondary": "#690005",
                    "on-primary": "#002e6a",
                    "surface-bright": "#3a3939",
                    "primary": "#adc6ff",
                    "on-error": "#690005",
                    "primary-container": "#4d8eff",
                    "on-tertiary-container": "#461f00",
                    "surface-dim": "#131313",
                    "on-surface-variant": "#c2c6d6",
                    "secondary-container": "#db0418",
                    "on-tertiary-fixed-variant": "#723600",
                    "primary-fixed": "#d8e2ff",
                    "tertiary": "#ffb786",
                    "on-tertiary": "#502400",
                    "surface": "#131313",
                    "on-error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#004395",
                    "tertiary-fixed": "#ffdcc6",
                    "background": "#131313",
                    "surface-container": "#201f1f",
                    "inverse-on-surface": "#313030",
                    "error": "#ffb4ab",
                    "surface-container-high": "#2a2a2a",
                    "surface-tint": "#adc6ff",
                    "on-background": "#e5e2e1",
                    "on-secondary-container": "#ffecea",
                    "on-primary-container": "#00285d",
                    "outline-variant": "#424754",
                    "on-primary-fixed": "#001a42",
                    "inverse-primary": "#005ac2",
                    "inverse-surface": "#e5e2e1",
                    "primary-fixed-dim": "#adc6ff",
                    "on-tertiary-fixed": "#311400",
                    "surface-variant": "#353534",
                    "on-surface": "#e5e2e1",
                    "secondary": "#ffb4ab",
                    "surface-container-low": "#1c1b1b",
                    "error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0e0e0e; /* surface-container-lowest */
        }
        
        /* Pulse Animation for SOS */
        @keyframes sosPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 180, 171, 0.4); } /* error color */
            70% { box-shadow: 0 0 0 50px rgba(255, 180, 171, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 180, 171, 0); }
        }
        
        .sos-pulse-ring {
            animation: sosPulse 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        /* Ambient glowing background */
        .ambient-glow {
            background: radial-gradient(circle at center, rgba(147, 0, 10, 0.2) 0%, rgba(14, 14, 14, 1) 70%); /* error-container to surface-container-lowest */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface h-screen w-full flex flex-col items-center justify-between ambient-glow overflow-hidden select-none">
<!-- Top Spacer for Balance -->
<div class="h-24 w-full"></div>
<!-- Main Content Area: Countdown -->
<div class="flex-1 flex flex-col items-center justify-center w-full px-6 z-10">
<!-- Warning Icon/Label -->
<div class="flex items-center space-x-2 text-error mb-8">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-label text-sm font-medium tracking-widest uppercase">Emergency Protocol</span>
</div>
<!-- The Countdown Circle -->
<div class="relative flex items-center justify-center w-64 h-64 mb-10">
<!-- Outer Ring -->
<svg class="absolute inset-0 w-full h-full rotate-[-90deg]" viewbox="0 0 100 100">
<!-- Track -->
<circle class="stroke-surface-container-high" cx="50" cy="50" fill="none" r="45" stroke-width="4"></circle>
<!-- Progress (Animated conceptually, static for this exercise) -->
<circle class="stroke-error" cx="50" cy="50" fill="none" r="45" stroke-dasharray="283" stroke-dashoffset="56" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<!-- Central Number -->
<div class="sos-pulse-ring bg-error-container rounded-[50%] w-48 h-48 flex items-center justify-center shadow-[0_0_64px_rgba(255,180,171,0.2)] border border-error/20">
<span class="font-headline text-[120px] font-black leading-none text-error tracking-tighter tabular-nums drop-shadow-[0_0_12px_rgba(255,180,171,0.5)]">
                    5
                </span>
</div>
</div>
<!-- Subtext -->
<div class="text-center space-y-2">
<h2 class="font-headline text-2xl font-bold text-on-surface tracking-tight">Sending emergency signal...</h2>
<p class="font-body text-base text-on-surface-variant max-w-xs mx-auto">Alerting MatchBuddy security and local authorities.</p>
</div>
</div>
<!-- Bottom Action Area -->
<div class="w-full px-6 pb-12 z-10">
<button class="w-full bg-surface-container-high hover:bg-surface-container-highest border border-outline-variant/30 text-on-surface font-headline text-xl font-bold py-6 rounded-xl shadow-[0_8px_32px_rgba(0,0,0,0.4)] active:scale-95 transition-all duration-300 ease-[spring(1,100,20,0)] flex items-center justify-center space-x-3 group">
<span class="material-symbols-outlined text-outline group-hover:text-on-surface transition-colors">close</span>
<span class="tracking-widest uppercase">CANCEL</span>
</button>
<p class="text-center font-label text-xs text-outline mt-4">Slide or tap to abort</p>
</div>
</body></html>
